<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Il Gioco della Papera</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@500;700&display=swap" rel="stylesheet">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="shortcut icon" href="favicon.ico">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="game-header">
    <a href="casa.html" class="btn-secondary admin-link admin-link-top">Vai a Casa di Nonna Papera</a>
    <h1>🐣 Il gioco della Papera 🦆</h1>
    <div class="status-bar game-status-bar">
      <div class="game-status-grid">
        <div class="game-status-item">
          <span class="status-label">Turno attuale</span>
          <strong id="current-player-name">Caricamento...</strong>
        </div>
        <div class="game-status-item">
          <span class="status-label">Profilo</span>
          <strong id="auth-user-name">Non autenticato</strong>
        </div>
      </div>
      <div class="auth-controls game-auth-controls">
        <button id="btn-login-google" class="btn-secondary">Entra con Google</button>
        <span class="auth-controls-spacer" aria-hidden="true"></span>
        <button id="btn-logout" class="btn-secondary hidden">Esci</button>
      </div>
    </div>
  </header>

  <main>
    <div id="board" class="board-container">
      </div>
    <section class="players-legend" aria-label="Legenda giocatori">
      <h2>Paperelle</h2>
      <div id="players-legend-list" class="players-legend-list"></div>
      <p id="bonus-event-text" class="bonus-event hidden"></p>
    </section>
  </main>

  <footer class="game-controls">
    <button id="btn-roll-dice" class="btn-primary" disabled>Tira il Dado 🎲</button>
  </footer>

  <div id="question-modal" class="modal hidden">
    <div class="modal-content">
      <h2 id="question-text">Testo della domanda qui...</h2>
      <textarea id="answer-input" rows="4" placeholder="Scrivi la tua risposta..."></textarea>
      <button id="btn-submit-answer" class="btn-secondary">Invia Risposta</button>
    </div>
  </div>

  <div id="dice-result-overlay" class="dice-overlay hidden" aria-live="polite">
    <div class="dice-card">
      <p>Hai tirato</p>
      <div id="dice-result-value" class="dice-value">-</div>
    </div>
  </div>

  <div id="game-over-banner" class="game-over-overlay hidden" aria-live="assertive" aria-modal="true" role="dialog">
    <div id="game-over-confetti" class="confetti-layer" aria-hidden="true"></div>
    <div class="game-over-card">
      <p class="game-over-eyebrow">Partita conclusa</p>
      <h2 id="game-over-title">Vittoria!</h2>
      <p id="game-over-subtitle" class="game-over-subtitle">Una papera ha raggiunto il traguardo.</p>
      <button id="btn-game-over-close" class="btn-secondary">Chiudi Banner</button>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
